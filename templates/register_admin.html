{% extends 'base.html' %}

{% block title %}Admin Setup - SmartPass{% endblock %}

{% block content %}
<div class="card" style="border-top: 4px solid var(--danger);">
    <h2><span style="color: var(--danger)">🔒 Secret</span> Admin Setup</h2>
    <p style="text-align: center; margin-bottom: 1.5rem;">Create a secure administrator account.</p>
    <form method="POST" action="{{ url_for('secret_admin_setup') }}">
        <div class="form-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" name="email" required placeholder="Choose an admin email">
        </div>
        <div class="form-group">
            <label for="password">Admin Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a strong password">
        </div>
        <button type="submit" class="btn btn-danger form-submit">Create Admin Account</button>
    </form>
</div>
{% endblock %}
