{% extends 'base.html' %}

{% block title %}{{ t.apply_pass }} - SmartPass{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>{{ t.apply_pass }}</h2>
    <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline">{{ t.home }}</a>
</div>

<div class="card" style="margin: 0; max-width: 600px;">
    <form method="POST" action="{{ url_for('apply_pass') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="pass_type">{{ t.pass_type }}</label>
            <select id="pass_type" name="pass_type" required>
                <option value="Monthly">Monthly Pass (30 Days)</option>
                <option value="Quarterly">Quarterly Pass (90 Days)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="source">{{ t.source }}</label>
            <select id="source" name="source" required>
                <option value="">-- Select Village --</option>
                {% for village in villages %}
                <option value="{{ village }}">{{ village }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="destination">{{ t.destination }}</label>
            <select id="destination" name="destination" required>
                <option value="">-- Select Village --</option>
                {% for village in villages %}
                <option value="{{ village }}">{{ village }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="profile_pic">{{ t.profile_photo }}</label>
            <input type="file" id="profile_pic" name="profile_pic" accept=".jpg, .jpeg, .png" required>
        </div>
        <div class="form-group">
            <label for="aadhar_pic">{{ t.aadhar_photo }}</label>
            <input type="file" id="aadhar_pic" name="aadhar_pic" accept=".jpg, .jpeg, .png" required>
        </div>
        
        <button type="submit" class="btn btn-primary form-submit">{{ t.submit }}</button>
    </form>
</div>
{% endblock %}
