{% extends "base.html" %}
{% block title %}{{ t.apply_pass }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="font-weight-light my-1">{{ t.apply_pass }}</h3>
            </div>
            <div class="card-body p-5">
                <form action="{{ url_for('apply_pass') }}" method="post" enctype="multipart/form-data">
                    <div class="form-row mb-3">
                        <div class="col-md-6">
                            <label class="small mb-1 font-weight-bold">{{ t.source }}</label>
                            <select name="source" class="form-control" required>
                                {% for village in villages %}
                                <option value="{{ village }}">{{ village }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small mb-1 font-weight-bold">{{ t.destination }}</label>
                            <select name="destination" class="form-control" required>
                                <option value="Kolhapur Central">Kolhapur Central</option>
                                {% for village in villages %}
                                <option value="{{ village }}">{{ village }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="small mb-1 font-weight-bold">{{ t.pass_type_label }}</label>
                        <select name="pass_type" class="form-control" required>
                            <option value="Monthly">Monthly</option>
                            <option value="Quarterly">Quarterly</option>
                            <option value="Yearly">Yearly</option>
                        </select>
                    </div>

                    <div class="form-group mb-4">
                        <label class="small mb-1 font-weight-bold">{{ t.photo_label }}</label>
                        <input type="file" name="profile_pic" class="form-control-file" accept="image/*" required>
                    </div>

                    <div class="form-group mb-4">
                        <label class="small mb-1 font-weight-bold">{{ t.aadhar_label }}</label>
                        <input type="file" name="aadhar_pic" class="form-control-file" accept="image/*" required>
                    </div>

                    <div class="form-group mt-4 mb-0">
                        <button type="submit" class="btn btn-primary btn-block py-3">
                            {{ t.submit_btn }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
